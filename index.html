<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Küche">
<title>Küche</title>
<style>
  :root{
    color-scheme: light;
    --bg:#f7f3ea; --ink:#202124; --muted:#6b6258; --line:#d9d2c6;
    --panel:#fffdf8; --accent:#0f766e; --accent-soft:#d7f0ea; --danger:#9f2d20;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    touch-action:manipulation; -webkit-text-size-adjust:100%;
  }
  .app-shell{
    width:min(560px,100%); min-height:100vh; margin:0 auto;
    padding:max(8px,env(safe-area-inset-top)) 14px max(8px,env(safe-area-inset-bottom));
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:8px 0 12px;
  }
  h1,h2,p{margin:0;}
  h1{font-size:30px; line-height:1.1;}
  h2{font-size:20px;}
  .topbar p,.status,.hint{color:var(--muted); font-size:14px;}
  button{
    min-height:44px; border:0; border-radius:8px; background:var(--accent);
    color:#fff; font:inherit; font-weight:700; padding:10px 14px; touch-action:manipulation;
  }
  button:disabled{background:#b7b0a6;}
  .icon-button{width:44px; padding:0; font-size:22px;}
  .text-button{background:transparent; color:var(--danger); padding-inline:0;}
  .btn-soft{background:var(--accent-soft); color:var(--accent);}
  .btn-soft.on{background:var(--accent); color:#fff;}

  /* Gruppen */
  .group{margin:0;}
  .group-title{
    display:flex; align-items:center; gap:8px;
    font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;
    color:var(--muted); padding:5px 2px 4px;
  }
  .group-title::after{content:""; flex:1; height:1px; background:var(--line);}

  .items{display:grid; gap:7px;}
  .item-card{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:4px 14px;
  }
  .item-card.active{border-color:var(--accent); background:var(--accent-soft);}
  .item-name{font-size:18px; font-weight:800;}
  .counter{display:inline-grid; grid-template-columns:44px 44px 44px; align-items:center; gap:8px;}
  .counter button{width:44px; min-height:40px; font-size:24px; line-height:1; padding:0;}
  .counter .value{text-align:center; font-size:22px; font-weight:800; font-variant-numeric:tabular-nums;}

  .actions{display:flex; align-items:center; gap:12px; padding:7px 0 2px;}
  .actions .print{margin-left:auto; flex:1 1 auto; min-height:44px; font-size:17px;}
  .status{min-height:0; padding-top:2px; font-size:13px;}
  .settings-link{
    display:block; width:100%; margin-top:8px;
    background:transparent; color:var(--muted); border:1px solid var(--line);
    min-height:38px; font-weight:700;
  }
  .status.ok{color:var(--accent); font-weight:700;}
  .status.err{color:var(--danger); font-weight:700;}

  /* Einstellungen */
  .section-title{display:flex; align-items:center; justify-content:space-between; padding:14px 0 10px;}
  .hint{padding:8px 0 10px;}
  .field{display:grid; gap:6px; margin:8px 0 10px;}
  .field label{font-size:14px; color:var(--muted); font-weight:700;}
  .field input{
    font:inherit; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    background:var(--panel); color:var(--ink); font-variant-numeric:tabular-nums;
  }
  .btn-small{min-height:40px; font-size:15px;}
  .printer-list{display:grid; gap:10px; margin-top:10px;}
  .printer-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:10px 12px;
  }
  .printer-host{font-variant-numeric:tabular-nums; font-weight:700;}
  .printer-model{color:var(--muted); font-size:13px; margin-top:2px;}
  .assign{display:flex; gap:6px;}
  .assign button{min-height:38px; padding:6px 10px; font-size:14px;}
  [hidden]{display:none !important;}
</style>
</head>
<body>
<div class="app-shell">

  <!-- ===== Bestellen ===== -->
  <section id="orderView">
    <!-- Küche -->
    <div class="group">
      <div class="group-title">Küche</div>
      <div class="items" id="items_kueche"></div>
      <div class="actions">
        <button class="text-button" id="reset_kueche" type="button">Zurücksetzen</button>
        <button class="print" id="print_kueche" type="button">An Küche drucken</button>
      </div>
      <p class="status" id="status_kueche"></p>
    </div>

    <!-- Kiosk -->
    <div class="group">
      <div class="group-title">Kiosk</div>
      <div class="items" id="items_kiosk"></div>
      <div class="actions">
        <button class="text-button" id="reset_kiosk" type="button">Zurücksetzen</button>
        <button class="print" id="print_kiosk" type="button">In Kiosk drucken</button>
      </div>
      <p class="status" id="status_kiosk"></p>
    </div>

    <button class="settings-link" id="settingsBtn" type="button">⚙︎ Einstellungen</button>
  </section>

  <!-- ===== Einstellungen ===== -->
  <section id="settingsView" hidden>
    <div class="topbar">
      <div><h1>Einstellungen</h1></div>
      <button class="icon-button" id="backBtn" type="button" aria-label="Zurück">✕</button>
    </div>

    <div class="section-title"><h2>Drucker Küche</h2></div>
    <div class="field">
      <label for="ip_kueche">IP-Adresse</label>
      <input id="ip_kueche" type="text" inputmode="decimal" autocapitalize="off"
             autocomplete="off" spellcheck="false" placeholder="192.168.1.85">
    </div>
    <button class="btn-small" id="test_kueche" type="button">Testdruck Küche</button>
    <p class="status" id="teststatus_kueche"></p>

    <div class="section-title"><h2>Drucker Kiosk</h2></div>
    <div class="field">
      <label for="ip_kiosk">IP-Adresse</label>
      <input id="ip_kiosk" type="text" inputmode="decimal" autocapitalize="off"
             autocomplete="off" spellcheck="false" placeholder="192.168.1.85">
    </div>
    <button class="btn-small" id="test_kiosk" type="button">Testdruck Kiosk</button>
    <p class="status" id="teststatus_kiosk"></p>

    <div id="scanBlock" hidden>
      <div class="section-title" style="padding-top:18px"><h2>Im Netzwerk suchen</h2></div>
      <button id="scanBtn" type="button">Drucker im Netzwerk suchen</button>
      <p class="status" id="scanStatus"></p>
      <div class="printer-list" id="printerList"></div>
    </div>

    <p class="hint">Gedruckt wird per ePOS-Print über HTTP. „Secure Printing“ am Drucker muss <b>aus</b> sein.</p>
  </section>

</div>

<script>
'use strict';

// Zwei Sektionen mit je eigenem Drucker.
const MENUS = {
  kueche: {
    label: 'Küche', heading: 'KÜCHE', printBtn: 'print_kueche',
    items: [
      { key:'broetchen', name:'Brötchen' },
      { key:'pommes',    name:'Pommes' },
      { key:'backfisch', name:'Backfisch' },
    ],
  },
  kiosk: {
    label: 'Kiosk', heading: 'KIOSK', printBtn: 'print_kiosk',
    items: [
      { key:'backfisch',     name:'Backfisch' },
      { key:'matjes',        name:'Matjes' },
      { key:'bismarck',      name:'Bismarck' },
      { key:'krabbe',        name:'Krabbe' },
      { key:'raeucherlachs', name:'Räucherlachs' },
      { key:'sherry',        name:'Sherry' },
    ],
  },
};
const TARGETS = ['kueche', 'kiosk'];

const state = { qty: { kueche:{}, kiosk:{} } };
const $ = (id) => document.getElementById(id);
const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

// ---- Töne (Web Audio, ohne Dateien) --------------------------------------
let _audio = null;
function ac(){
  if (!_audio){
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) _audio = new AC();
  }
  if (_audio && _audio.state === 'suspended') _audio.resume();
  return _audio;
}
function beep(freq, durMs, type, gain){
  const ctx = ac(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  osc.connect(g); g.connect(ctx.destination);
  const t = ctx.currentTime, vol = gain || 0.14;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.004);
  g.gain.exponentialRampToValueAtTime(0.0001, t + durMs/1000);
  osc.start(t);
  osc.stop(t + durMs/1000 + 0.02);
}
const sndUp      = () => beep(660, 55, 'square', 0.10);
const sndDown    = () => beep(440, 55, 'square', 0.10);
const sndReset   = () => beep(300, 70, 'triangle', 0.10);
const sndSuccess = () => { beep(784, 90, 'sine', 0.16); setTimeout(() => beep(1047, 130, 'sine', 0.16), 85); };
const sndError   = () => { beep(200, 220, 'sawtooth', 0.14); setTimeout(() => beep(150, 260, 'sawtooth', 0.14), 120); };

// ---- Bildschirm wachhalten (zusätzlich zum nativen Idle-Timer) -----------
let _wakeLock = null;
async function keepAwake(){
  try {
    if ('wakeLock' in navigator){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch (e) { /* nicht unterstützt -> nativer Idle-Timer greift */ }
}

// ---- Speicher ------------------------------------------------------------
function printerIP(target){
  // Migration: alter Einzel-Schlüssel -> beide Drucker
  const legacy = localStorage.getItem('kueche_ip');
  return localStorage.getItem('kueche_ip_' + target) || legacy || '192.168.1.85';
}
function setPrinterIP(target, ip){ localStorage.setItem('kueche_ip_' + target, ip.trim()); }

function nextOrderNo(target){
  const key = 'kueche_counter_' + target;
  const today = new Date().toISOString().slice(0,10);
  let c;
  try { c = JSON.parse(localStorage.getItem(key) || '{}'); } catch { c = {}; }
  if (c.date !== today) c = { date: today, seq: 0 };
  c.seq = (c.seq || 0) + 1;
  localStorage.setItem(key, JSON.stringify(c));
  return c.seq;
}

// ---- ePOS-Print XML ------------------------------------------------------
function escXml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function soapWrap(inner){
  return '<?xml version="1.0" encoding="utf-8"?>' +
    '<s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body>' +
    '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">' +
    inner + '</epos-print></s:Body></s:Envelope>';
}
function nowStr(){
  const d = new Date(), p = (n)=>String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function buildOrderXml(items, orderNo, heading){
  let b = '';
  b += '<text lang="de" smooth="true"/>';
  b += '<text align="center"/>';
  b += '<text dw="true" dh="true"/>';
  b += '<text>' + escXml(heading) + '&#10;</text>';
  b += '<text dw="false" dh="false"/>';
  b += '<text em="true"/>';
  b += '<text>Bestellung #' + String(orderNo).padStart(4,'0') + '&#10;</text>';
  b += '<text em="false"/>';
  b += '<text>' + escXml(nowStr()) + '&#10;</text>';
  b += '<text align="left"/>';
  b += '<text>' + '-'.repeat(32) + '&#10;</text>';
  b += '<text dh="true"/>';
  for (const it of items){
    b += '<text> ' + it.qty + 'x ' + escXml(it.name) + '&#10;</text>';
  }
  b += '<text dh="false"/>';
  b += '<feed line="3"/>';
  b += '<cut type="feed"/>';
  return soapWrap(b);
}
function buildTestXml(heading){
  let b = '';
  b += '<text lang="de" smooth="true"/><text align="center"/>';
  b += '<text dw="true" dh="true"/><text>' + escXml(heading) + '&#10;</text>';
  b += '<text dw="false" dh="false"/><text>Testdruck&#10;</text>';
  b += '<text>Umlaute: ä ö ü Ä Ö Ü ß&#10;</text>';
  b += '<text>' + escXml(nowStr()) + '&#10;</text>';
  b += '<feed line="3"/><cut type="feed"/>';
  return soapWrap(b);
}

// ---- Druck-Brücke (nativ) / Fallback fetch -------------------------------
function printerUrl(target){
  return `http://${printerIP(target)}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;
}
let _printSeq = 0;
const _printWaiters = {};
window.__kprintResult = function(id, ok, message){
  const w = _printWaiters[id];
  if (!w) return;
  delete _printWaiters[id];
  ok ? w.resolve() : w.reject(new Error(message || 'Druckfehler'));
};
function nativeBridge(){
  return window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.kprint;
}
async function sendXml(xml, target){
  const bridge = nativeBridge();
  if (bridge){
    const id = ++_printSeq;
    const p = new Promise((resolve, reject) => {
      _printWaiters[id] = { resolve, reject };
      setTimeout(() => {
        if (_printWaiters[id]){ delete _printWaiters[id]; reject(new Error('Zeitüberschreitung')); }
      }, 15000);
    });
    bridge.postMessage({ id, url: printerUrl(target), xml });
    return p;
  }
  const res = await fetch(printerUrl(target), {
    method: 'POST', headers: { 'Content-Type': 'text/xml; charset=utf-8' }, body: xml,
  });
  const txt = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  if (!/success="true"/.test(txt)){
    const m = txt.match(/code="([^"]*)"/);
    throw new Error('Drucker meldete Fehler' + (m && m[1] ? ` (${m[1]})` : '') + '.');
  }
}

// ---- Bestell-Ansicht -----------------------------------------------------
function renderItems(target){
  const root = $('items_' + target);
  root.innerHTML = '';
  for (const item of MENUS[target].items){
    const qty = state.qty[target][item.key] || 0;
    const card = document.createElement('div');
    card.className = 'item-card' + (qty > 0 ? ' active' : '');

    const name = document.createElement('div');
    name.className = 'item-name';
    name.textContent = item.name;

    const counter = document.createElement('div');
    counter.className = 'counter';

    const minus = document.createElement('button');
    minus.type = 'button'; minus.textContent = '−'; minus.disabled = qty <= 0;
    minus.addEventListener('click', () => changeQty(target, item.key, -1));

    const value = document.createElement('div');
    value.className = 'value'; value.textContent = String(qty);

    const plus = document.createElement('button');
    plus.type = 'button'; plus.textContent = '+';
    plus.addEventListener('click', () => changeQty(target, item.key, +1));

    counter.append(minus, value, plus);
    card.append(name, counter);
    root.append(card);
  }
}
function changeQty(target, key, delta){
  const cur = state.qty[target];
  cur[key] = Math.max(0, (cur[key] || 0) + delta);
  (delta > 0 ? sndUp : sndDown)();
  renderItems(target);
  setStatus('status_' + target, '');
}
function currentItems(target){
  return MENUS[target].items
    .map((m) => ({ name: m.name, qty: state.qty[target][m.key] || 0 }))
    .filter((it) => it.qty > 0);
}
function resetSection(target, silent){
  state.qty[target] = {};
  if (!silent) sndReset();
  renderItems(target);
  setStatus('status_' + target, '');
}
async function printSection(target){
  const items = currentItems(target);
  if (!items.length){
    setStatus('status_' + target, 'Bitte zuerst Positionen wählen.', 'err');
    return;
  }
  const btn = $(MENUS[target].printBtn);
  btn.disabled = true;
  setStatus('status_' + target, 'Drucke …');
  const orderNo = nextOrderNo(target);
  try {
    await sendXml(buildOrderXml(items, orderNo, MENUS[target].heading), target);
    setStatus('status_' + target, `Gedruckt — ${MENUS[target].label} #${String(orderNo).padStart(4,'0')}`, 'ok');
    sndSuccess();
    resetSection(target, true);
  } catch (e){
    setStatus('status_' + target, 'Fehler: ' + e.message + ' — Drucker/WLAN prüfen.', 'err');
    sndError();
  } finally {
    btn.disabled = false;
  }
}

// ---- Einstellungen: Testdruck --------------------------------------------
async function testPrint(target){
  const btn = $('test_' + target);
  btn.disabled = true;
  setStatus('teststatus_' + target, 'Testdruck wird gesendet …');
  try {
    await sendXml(buildTestXml(MENUS[target].heading), target);
    setStatus('teststatus_' + target, 'Testdruck gesendet — kommt er aus dem Drucker?', 'ok');
  } catch (e){
    setStatus('teststatus_' + target, 'Fehler: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ---- Drucker-Suche (nur in der nativen App) ------------------------------
let _scanSeq = 0;
const _scanWaiters = {};
let _lastPrinters = [];
window.__kscanResult = function(id, json){
  const w = _scanWaiters[id];
  if (!w) return;
  delete _scanWaiters[id];
  try { w.resolve(JSON.parse(json) || []); }
  catch (e){ w.reject(new Error('Scan-Antwort fehlerhaft')); }
};
function scanBridge(){
  return window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.kscan;
}
function requestScan(){
  const bridge = scanBridge();
  if (!bridge) return Promise.reject(new Error('Suche nur in der App verfügbar'));
  const id = ++_scanSeq;
  return new Promise((resolve, reject) => {
    _scanWaiters[id] = { resolve, reject };
    setTimeout(() => {
      if (_scanWaiters[id]){ delete _scanWaiters[id]; reject(new Error('Zeitüberschreitung')); }
    }, 30000);
    bridge.postMessage({ id });
  });
}
async function scanPrinters(){
  const btn = $('scanBtn');
  btn.disabled = true;
  setStatus('scanStatus', 'Suche läuft … (ein paar Sekunden)');
  try {
    _lastPrinters = await requestScan();
    renderPrinterList();
    setStatus('scanStatus', `${_lastPrinters.length} Drucker gefunden — je Drucker einer Sektion zuweisen.`);
  } catch (e){
    setStatus('scanStatus', 'Fehler: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}
function renderPrinterList(){
  const root = $('printerList');
  root.innerHTML = '';
  if (!_lastPrinters.length){
    root.innerHTML = '<p class="hint">Keine Drucker gefunden.</p>';
    return;
  }
  for (const p of _lastPrinters){
    const row = document.createElement('div');
    row.className = 'printer-row';

    const info = document.createElement('div');
    const host = document.createElement('div');
    host.className = 'printer-host';
    host.textContent = p.host;
    info.append(host);
    if (p.model){
      const model = document.createElement('div');
      model.className = 'printer-model';
      model.textContent = p.model;
      info.append(model);
    }

    const assign = document.createElement('div');
    assign.className = 'assign';
    for (const target of TARGETS){
      const b = document.createElement('button');
      const isOn = printerIP(target) === p.host;
      b.type = 'button';
      b.className = 'btn-soft' + (isOn ? ' on' : '');
      b.textContent = (isOn ? '✓ ' : '') + MENUS[target].label;
      b.addEventListener('click', () => assignPrinter(target, p.host));
      assign.append(b);
    }

    row.append(info, assign);
    root.append(row);
  }
}
function assignPrinter(target, host){
  setPrinterIP(target, host);
  $('ip_' + target).value = host;
  renderPrinterList();
  setStatus('scanStatus', `${MENUS[target].label}: ${host} gewählt.`, 'ok');
}

// ---- Ansichten / Hilfen --------------------------------------------------
function setStatus(id, text, kind){
  const el = $(id);
  el.textContent = text || '';
  el.className = 'status' + (kind ? ' ' + kind : '');
}
function showSettings(show){
  $('orderView').hidden = show;
  $('settingsView').hidden = !show;
  if (show){
    for (const t of TARGETS) $('ip_' + t).value = printerIP(t);
  }
}

function init(){
  $('settingsBtn').addEventListener('click', () => showSettings(true));
  $('backBtn').addEventListener('click', () => showSettings(false));

  for (const t of TARGETS){
    $(MENUS[t].printBtn).addEventListener('click', () => printSection(t));
    $('reset_' + t).addEventListener('click', () => resetSection(t));
    $('test_' + t).addEventListener('click', () => testPrint(t));
    $('ip_' + t).addEventListener('change', (e) => { if (e.target.value.trim()) setPrinterIP(t, e.target.value); });
    renderItems(t);
  }

  $('scanBtn').addEventListener('click', scanPrinters);
  if (scanBridge()) $('scanBlock').hidden = false;

  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
}

init();
</script>
</body>
</html>
